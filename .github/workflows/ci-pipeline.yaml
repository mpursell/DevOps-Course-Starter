name: Continuous Integration
on: 
  push:
    paths-ignore:
      -'./README.md'
      -'./tricks.yaml'
      -'documentation/**'
      -'logs/**'
  
  pull_request:
    paths-ignore:
      -'./README.md'
      -'./tricks.yaml'
      -'documentation/**'
      -'logs/**'

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      # only output hash of image and pass that to docker run
      - run: docker run --rm $(docker build -q . --target testing)

  slackNotification:
    name: Slack notification
    runs-on: ubuntu-latest
    environment: Build and Test environment
    steps:
    - uses: actions/checkout@v2
    - name: Slack Notification Build & Test
      uses: bryannice/gitactions-slack-notification@2.0.0
      env:
        SLACK_INCOMING_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_MESSAGE: 'Build and test workflow running'
        SLACK_TITLE: 'Build and Test Notification'


  docker:
    needs: build
    #if: github.repository == 'mpursell/DevOps-Course-Starter/module8'
    runs-on: ubuntu-latest
    environment: Build and Test environment
    steps:
    - name: Checkout
      uses: actions/checkout@v1
      with:
        fetch-depth: 1
    
    # Setup docker buildx
    # https://github.com/docker/setup-qemu-action
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v1
    
    # https://github.com/docker/setup-buildx-action
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Build & Push to Docker Hub
      uses: opspresso/action-docker@master
      with:
        args: --docker

      env:
        IMAGE_NAME: mikerp/todoapp
        USERNAME: ${{ secrets.DOCKER_USERNAME }}
        PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        TAG_NAME: "latest"
        BUILDX: "true"

  heroku:
  - name: 'heroku container push' #set whatevername you want to your github job
    on: {'push'} # set the events you would like to trigger this job
    jobs:
      build:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v2
          - name: Build, Push and Deploy to Heroku #set the whatever name you want to this step
            id: heroku
            uses: jctaveras/heroku-deploy@v1.0.0  # use the latest version of the action
            with:
              email: ${{ secrets.HEROKU_EMAIL }} # your heroku email
              api_key: ${{ secrets.HEROKU_API_KEY }} # your  heroku api key
              app_name: ${{ secrets.HEROKU_APP_NAME }} # you aplication name
              dockerfile_path: '.' # set the path to the folder wher the Dockerfile is located
              options: '--target production' # Docker Build Options
              formation: 'web' # Docker Dyno Formation. By default is web

